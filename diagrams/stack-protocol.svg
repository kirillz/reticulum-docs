<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" class="diagram-svg">
  <defs>
    <linearGradient id="stack1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4caf50"/>
      <stop offset="100%" style="stop-color:#2e7d32"/>
    </linearGradient>
    <linearGradient id="stack2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2196f3"/>
      <stop offset="100%" style="stop-color:#1565c0"/>
    </linearGradient>
    <linearGradient id="stack3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9800"/>
      <stop offset="100%" style="stop-color:#e65100"/>
    </linearGradient>
    <linearGradient id="stack4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9c27b0"/>
      <stop offset="100%" style="stop-color:#4a148c"/>
    </linearGradient>
    <linearGradient id="stack5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#607d8b"/>
      <stop offset="100%" style="stop-color:#37474f"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="280" height="280" fill="#f5f5f5" class="svg-bg" rx="12"/>
  
  <!-- Title -->
  <text x="140" y="25" text-anchor="middle" fill="#333" class="svg-text" font-size="12" font-weight="bold">Стек протоколов</text>
  
  <!-- Layer 7 - Application -->
  <rect x="40" y="40" width="200" height="35" rx="6" fill="url(#stack1)" stroke="#2e7d32" stroke-width="2"/>
  <text x="140" y="58" text-anchor="middle" fill="#fff" class="svg-text" font-size="10" font-weight="bold">L7 Приложения</text>
  <text x="140" y="70" text-anchor="middle" fill="#fff" class="svg-text" font-size="8">Nomad, LXMF</text>
  
  <!-- Layer 4 - Transport -->
  <rect x="40" y="85" width="200" height="35" rx="6" fill="url(#stack2)" stroke="#1565c0" stroke-width="2"/>
  <text x="140" y="103" text-anchor="middle" fill="#fff" class="svg-text" font-size="10" font-weight="bold">L4 Транспорт</text>
  <text x="140" y="115" text-anchor="middle" fill="#fff" class="svg-text" font-size="8">Encrypted Transport</text>
  
  <!-- Layer 3 - Network -->
  <rect x="40" y="130" width="200" height="35" rx="6" fill="url(#stack3)" stroke="#e65100" stroke-width="2"/>
  <text x="140" y="148" text-anchor="middle" fill="#fff" class="svg-text" font-size="10" font-weight="bold">L3 Сеть</text>
  <text x="140" y="160" text-anchor="middle" fill="#fff" class="svg-text" font-size="8">Routing &amp; Addressing</text>
  
  <!-- Layer 2 - Data Link -->
  <rect x="40" y="175" width="200" height="35" rx="6" fill="url(#stack4)" stroke="#4a148c" stroke-width="2"/>
  <text x="140" y="193" text-anchor="middle" fill="#fff" class="svg-text" font-size="10" font-weight="bold">L2 Канал</text>
  <text x="140" y="205" text-anchor="middle" fill="#fff" class="svg-text" font-size="8">Interface Management</text>
  
  <!-- Layer 1 - Physical -->
  <rect x="40" y="220" width="200" height="35" rx="6" fill="url(#stack5)" stroke="#37474f" stroke-width="2"/>
  <text x="140" y="238" text-anchor="middle" fill="#fff" class="svg-text" font-size="10" font-weight="bold">L1 Физический</text>
  <text x="140" y="250" text-anchor="middle" fill="#fff" class="svg-text" font-size="8">LoRa, WiFi, ETH, Serial</text>
  
  <!-- Down arrow -->
  <polygon points="140,260 135,270 145,270" fill="#607d8b" class="svg-arrow"/>
</svg>
