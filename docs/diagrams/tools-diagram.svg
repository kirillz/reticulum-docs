<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" class="diagram-svg">
  <defs>
    <linearGradient id="daemonGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4caf50"/>
      <stop offset="100%" style="stop-color:#2e7d32"/>
    </linearGradient>
    <linearGradient id="statusGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2196f3"/>
      <stop offset="100%" style="stop-color:#1565c0"/>
    </linearGradient>
    <linearGradient id="pathGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00bcd4"/>
      <stop offset="100%" style="stop-color:#006064"/>
    </linearGradient>
    <linearGradient id="idGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9c27b0"/>
      <stop offset="100%" style="stop-color:#4a148c"/>
    </linearGradient>
    <linearGradient id="fileGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9800"/>
      <stop offset="100%" style="stop-color:#e65100"/>
    </linearGradient>
    <linearGradient id="remoteGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e91e63"/>
      <stop offset="100%" style="stop-color:#880e4f"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="420" height="400" fill="#f3e5f5" class="svg-bg" rx="12"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" fill="#6a1b9a" class="svg-text" font-size="18" font-weight="bold" font-family="Roboto, Arial, sans-serif">🛠️ Утилиты командной строки RNS</text>
  
  <!-- Terminal window -->
  <g transform="translate(210, 210)">
    <rect x="-110" y="-70" width="220" height="140" rx="8" fill="#263238" stroke="#4a148c" stroke-width="3"/>
    <!-- Terminal header -->
    <rect x="-110" y="-70" width="220" height="24" rx="8" fill="#37474f"/>
    <circle cx="-90" cy="-58" r="4" fill="#ef5350"/>
    <circle cx="-73" cy="-58" r="4" fill="#ffa726"/>
    <circle cx="-56" cy="-58" r="4" fill="#66bb6a"/>
    <!-- Terminal content -->
    <rect x="-100" y="-40" width="200" height="100" rx="4" fill="#1c2528"/>
    <!-- Command lines -->
    <text x="-90" y="-20" fill="#00e676" class="svg-text" font-size="11" font-family="Roboto Mono, monospace">$ rnsd —daemon</text>
    <text x="-90" y="-4" fill="#00e676" class="svg-text" font-size="11" font-family="Roboto Mono, monospace">$ rnstatus —info</text>
    <text x="-90" y="12" fill="#00e676" class="svg-text" font-size="11" font-family="Roboto Mono, monospace">$ rnpath /dest</text>
    <text x="-90" y="28" fill="#00e676" class="svg-text" font-size="11" font-family="Roboto Mono, monospace">$ rnid —gen</text>
    <text x="-90" y="44" fill="#00e676" class="svg-text" font-size="11" font-family="Roboto Mono, monospace">$ rncp file.txt</text>
    <text x="-90" y="60" fill="#00e676" class="svg-text" font-size="11" font-family="Roboto Mono, monospace" opacity="0.6">$ _</text>
  </g>
  
  <!-- rnsd - Daemon -->
  <g transform="translate(90, 90)">
    <rect x="-60" y="-25" width="120" height="50" rx="8" fill="url(#daemonGrad)" stroke="#1b5e20" stroke-width="2"/>
    <text x="0" y="2" text-anchor="middle" fill="#ffffff" class="svg-text" font-size="15" font-weight="bold" font-family="Roboto, Arial, sans-serif">rnsd</text>
    <text x="0" y="22" text-anchor="middle" fill="#e8f5e9" class="svg-text" font-size="12" font-family="Roboto, Arial, sans-serif">Демон</text>
  </g>
  
  <!-- rnstatus - Status -->
  <g transform="translate(210, 90)">
    <rect x="-60" y="-25" width="120" height="50" rx="8" fill="url(#statusGrad)" stroke="#0d47a1" stroke-width="2"/>
    <text x="0" y="2" text-anchor="middle" fill="#ffffff" class="svg-text" font-size="15" font-weight="bold" font-family="Roboto, Arial, sans-serif">rnstatus</text>
    <text x="0" y="22" text-anchor="middle" fill="#e3f2fd" class="svg-text" font-size="12" font-family="Roboto, Arial, sans-serif">Статус</text>
  </g>
  
  <!-- rnpath - Path -->
  <g transform="translate(330, 90)">
    <rect x="-60" y="-25" width="120" height="50" rx="8" fill="url(#pathGrad)" stroke="#006064" stroke-width="2"/>
    <text x="0" y="2" text-anchor="middle" fill="#ffffff" class="svg-text" font-size="15" font-weight="bold" font-family="Roboto, Arial, sans-serif">rnpath</text>
    <text x="0" y="22" text-anchor="middle" fill="#e0f7fa" class="svg-text" font-size="12" font-family="Roboto, Arial, sans-serif">Маршрут</text>
  </g>
  
  <!-- rnid - Identity -->
  <g transform="translate(90, 330)">
    <rect x="-60" y="-25" width="120" height="50" rx="8" fill="url(#idGrad)" stroke="#4a148c" stroke-width="2"/>
    <text x="0" y="2" text-anchor="middle" fill="#ffffff" class="svg-text" font-size="15" font-weight="bold" font-family="Roboto, Arial, sans-serif">rnid</text>
    <text x="0" y="22" text-anchor="middle" fill="#f3e5f5" class="svg-text" font-size="12" font-family="Roboto, Arial, sans-serif">ID</text>
  </g>
  
  <!-- rncp - File copy -->
  <g transform="translate(210, 330)">
    <rect x="-60" y="-25" width="120" height="50" rx="8" fill="url(#fileGrad)" stroke="#bf360c" stroke-width="2"/>
    <text x="0" y="2" text-anchor="middle" fill="#ffffff" class="svg-text" font-size="15" font-weight="bold" font-family="Roboto, Arial, sans-serif">rncp</text>
    <text x="0" y="22" text-anchor="middle" fill="#ffebee" class="svg-text" font-size="12" font-family="Roboto, Arial, sans-serif">Копирование</text>
  </g>
  
  <!-- rnx/rnsh - Remote -->
  <g transform="translate(330, 330)">
    <rect x="-60" y="-25" width="120" height="50" rx="8" fill="url(#remoteGrad)" stroke="#880e4f" stroke-width="2"/>
    <text x="0" y="2" text-anchor="middle" fill="#ffffff" class="svg-text" font-size="15" font-weight="bold" font-family="Roboto, Arial, sans-serif">rnx / rnsh</text>
    <text x="0" y="22" text-anchor="middle" fill="#fce4ec" class="svg-text" font-size="12" font-family="Roboto, Arial, sans-serif">Remote</text>
  </g>
  
  <!-- Connection lines to terminal -->
  <line x1="90" y1="115" x2="120" y2="160" stroke="#4caf50" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="210" y1="115" x2="185" y2="160" stroke="#2196f3" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="300" y1="115" x2="255" y2="160" stroke="#00bcd4" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="90" y1="305" x2="120" y2="260" stroke="#9c27b0" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="210" y1="305" x2="195" y2="260" stroke="#ff9800" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="300" y1="305" x2="265" y2="260" stroke="#e91e63" stroke-width="2" stroke-dasharray="5,3"/>
</svg>
