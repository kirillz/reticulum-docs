<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" class="diagram-svg">
  <defs>
    <linearGradient id="nomadGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00bcd4"/>
      <stop offset="100%" style="stop-color:#006064"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="280" height="280" fill="#e0f7fa" class="svg-bg" rx="12"/>
  
  <!-- Laptop icon (central) -->
  <g transform="translate(140, 140)">
    <rect x="-50" y="-35" width="100" height="60" rx="6" fill="url(#nomadGrad)" stroke="#006064" stroke-width="3"/>
    <rect x="-45" y="-30" width="90" height="50" rx="3" fill="#b2ebf2" class="svg-screen"/>
    <!-- Screen content -->
    <rect x="-40" y="-25" width="30" height="8" rx="2" fill="#00bcd4"/>
    <rect x="-40" y="-12" width="50" height="4" rx="1" fill="#00838f"/>
    <rect x="-40" y="-4" width="40" height="4" rx="1" fill="#00838f"/>
    <rect x="-40" y="5" width="45" height="8" rx="2" fill="#00bcd4"/>
    <!-- Keyboard base -->
    <rect x="-55" y="25" width="110" height="15" rx="4" fill="#00838f"/>
  </g>
  
  <!-- Title -->
  <text x="140" y="35" text-anchor="middle" fill="#0097a7" class="svg-text" font-size="14" font-weight="bold">💻 Nomad Network</text>
  
  <!-- Feature satellites -->
  <g transform="translate(60, 70)">
    <circle cx="0" cy="0" r="20" fill="#fff" class="svg-feature-bg" stroke="#00bcd4" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#00bcd4" font-size="16">💬</text>
  </g>
  
  <g transform="translate(220, 70)">
    <circle cx="0" cy="0" r="20" fill="#fff" class="svg-feature-bg" stroke="#00bcd4" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#00bcd4" font-size="16">📝</text>
  </g>
  
  <g transform="translate(40, 200)">
    <circle cx="0" cy="0" r="20" fill="#fff" class="svg-feature-bg" stroke="#00bcd4" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#00bcd4" font-size="16">🌐</text>
  </g>
  
  <g transform="translate(240, 200)">
    <circle cx="0" cy="0" r="20" fill="#fff" class="svg-feature-bg" stroke="#00bcd4" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#00bcd4" font-size="16">🔐</text>
  </g>
  
  <!-- Connection lines -->
  <line x1="75" y1="85" x2="105" y2="115" stroke="#00bcd4" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="205" y1="85" x2="175" y2="115" stroke="#00bcd4" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="55" y1="185" x2="95" y2="165" stroke="#00bcd4" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="225" y1="185" x2="185" y2="165" stroke="#00bcd4" stroke-width="2" stroke-dasharray="4,2"/>
  
  <!-- Labels -->
  <text x="60" y="100" text-anchor="middle" fill="#666" class="svg-label" font-size="8">Чат</text>
  <text x="220" y="100" text-anchor="middle" fill="#666" class="svg-label" font-size="8">Форумы</text>
  <text x="40" y="230" text-anchor="middle" fill="#666" class="svg-label" font-size="8">Сеть</text>
  <text x="240" y="230" text-anchor="middle" fill="#666" class="svg-label" font-size="8">Приватность</text>
</svg>
