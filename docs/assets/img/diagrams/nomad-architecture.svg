<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" class="diagram-svg">
  <defs>
    <linearGradient id="nomadGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00bcd4"/>
      <stop offset="100%" style="stop-color:#006064"/>
    </linearGradient>
    <linearGradient id="nomadGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#26a69a"/>
      <stop offset="100%" style="stop-color:#004d40"/>
    </linearGradient>
    <linearGradient id="nomadGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4db6ac"/>
      <stop offset="100%" style="stop-color:#00695c"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowhead" markerWidth="14" markerHeight="12" refX="12" refY="6" orient="auto">
      <path d="M 0 0 L 14 6 L 0 12 Z" fill="#0097a7"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="520" height="420" fill="#e0f7fa" rx="16" class="svg-bg"/>
  
  <!-- Title -->
  <text x="260" y="38" text-anchor="middle" fill="#00838f" class="svg-text" font-size="17" font-weight="bold">Архитектура Nomad Network</text>
  
  <!-- Nomad Client Layer (top) -->
  <g transform="translate(60, 60)" filter="url(#shadow)">
    <rect x="0" y="0" width="400" height="65" rx="12" fill="url(#nomadGrad1)" stroke="#006064" stroke-width="2.5"/>
    <text x="200" y="40" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">Nomad Network Client</text>
  </g>
  
  <!-- Feature boxes inside Client - better spacing -->
  <g transform="translate(80, 105)" filter="url(#shadow)">
    <rect x="0" y="0" width="105" height="42" rx="10" fill="#ffffff" stroke="#00bcd4" stroke-width="2"/>
    <text x="52" y="27" text-anchor="middle" fill="#00838f" font-size="12" font-weight="bold">💬 Чаты</text>
  </g>
  <g transform="translate(207, 105)" filter="url(#shadow)">
    <rect x="0" y="0" width="105" height="42" rx="10" fill="#ffffff" stroke="#00bcd4" stroke-width="2"/>
    <text x="52" y="27" text-anchor="middle" fill="#00838f" font-size="12" font-weight="bold">📝 Форумы</text>
  </g>
  <g transform="translate(334, 105)" filter="url(#shadow)">
    <rect x="0" y="0" width="105" height="42" rx="10" fill="#ffffff" stroke="#00bcd4" stroke-width="2"/>
    <text x="52" y="27" text-anchor="middle" fill="#00838f" font-size="12" font-weight="bold">📰 Каналы</text>
  </g>
  
  <!-- Connection arrow to LXMF -->
  <line x1="260" y1="155" x2="260" y2="178" stroke="#0097a7" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#arrowhead)"/>
  
  <!-- LXMF Layer (middle) -->
  <g transform="translate(60, 185)" filter="url(#shadow)">
    <rect x="0" y="0" width="400" height="65" rx="12" fill="url(#nomadGrad2)" stroke="#004d40" stroke-width="2.5"/>
    <text x="200" y="40" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">LXMF Messaging Layer</text>
  </g>
  
  <!-- LXMF features - better spacing -->
  <g transform="translate(75, 230)" filter="url(#shadow)">
    <rect x="0" y="0" width="85" height="34" rx="8" fill="#ffffff" stroke="#26a69a" stroke-width="2"/>
    <text x="42" y="22" text-anchor="middle" fill="#00796b" font-size="11" font-weight="600">Сообщения</text>
  </g>
  <g transform="translate(178, 230)" filter="url(#shadow)">
    <rect x="0" y="0" width="75" height="34" rx="8" fill="#ffffff" stroke="#26a69a" stroke-width="2"/>
    <text x="37" y="22" text-anchor="middle" fill="#00796b" font-size="11" font-weight="600">Файлы</text>
  </g>
  <g transform="translate(271, 230)" filter="url(#shadow)">
    <rect x="0" y="0" width="90" height="34" rx="8" fill="#ffffff" stroke="#26a69a" stroke-width="2"/>
    <text x="45" y="22" text-anchor="middle" fill="#00796b" font-size="11" font-weight="600">Шифрование</text>
  </g>
  <g transform="translate(379, 230)" filter="url(#shadow)">
    <rect x="0" y="0" width="68" height="34" rx="8" fill="#ffffff" stroke="#26a69a" stroke-width="2"/>
    <text x="34" y="22" text-anchor="middle" fill="#00796b" font-size="11" font-weight="600">Мета</text>
  </g>
  
  <!-- Connection arrow to RNS -->
  <line x1="260" y1="272" x2="260" y2="295" stroke="#0097a7" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#arrowhead)"/>
  
  <!-- RNS Layer (bottom) -->
  <g transform="translate(60, 302)" filter="url(#shadow)">
    <rect x="0" y="0" width="400" height="65" rx="12" fill="url(#nomadGrad3)" stroke="#00695c" stroke-width="2.5"/>
    <text x="200" y="40" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">Reticulum Network Stack</text>
  </g>
  
  <!-- RNS features - better spacing -->
  <g transform="translate(75, 347)" filter="url(#shadow)">
    <rect x="0" y="0" width="80" height="34" rx="8" fill="#ffffff" stroke="#4db6ac" stroke-width="2"/>
    <text x="40" y="22" text-anchor="middle" fill="#004d40" font-size="11" font-weight="600">Маршруты</text>
  </g>
  <g transform="translate(173, 347)" filter="url(#shadow)">
    <rect x="0" y="0" width="70" height="34" rx="8" fill="#ffffff" stroke="#4db6ac" stroke-width="2"/>
    <text x="35" y="22" text-anchor="middle" fill="#004d40" font-size="11" font-weight="600">Туннель</text>
  </g>
  <g transform="translate(261, 347)" filter="url(#shadow)">
    <rect x="0" y="0" width="85" height="34" rx="8" fill="#ffffff" stroke="#4db6ac" stroke-width="2"/>
    <text x="42" y="22" text-anchor="middle" fill="#004d40" font-size="11" font-weight="600">Транспорт</text>
  </g>
  <g transform="translate(364, 347)" filter="url(#shadow)">
    <rect x="0" y="0" width="95" height="34" rx="8" fill="#ffffff" stroke="#4db6ac" stroke-width="2"/>
    <text x="47" y="22" text-anchor="middle" fill="#004d40" font-size="11" font-weight="600">Криптография</text>
  </g>
</svg>
