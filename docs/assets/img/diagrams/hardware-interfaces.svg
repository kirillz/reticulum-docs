<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 400" class="diagram-svg">
  <defs>
    <linearGradient id="wifiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bbdefb"/>
      <stop offset="100%" style="stop-color:#64b5f6"/>
    </linearGradient>
    <linearGradient id="loraGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe0b2"/>
      <stop offset="100%" style="stop-color:#ffb74d"/>
    </linearGradient>
    <linearGradient id="ethGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e6c9"/>
      <stop offset="100%" style="stop-color:#81c784"/>
    </linearGradient>
    <linearGradient id="tcpGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b2ebf2"/>
      <stop offset="100%" style="stop-color:#4dd0e1"/>
    </linearGradient>
    <linearGradient id="btGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c5cae9"/>
      <stop offset="100%" style="stop-color:#7986cb"/>
    </linearGradient>
    <linearGradient id="serialGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e1bee7"/>
      <stop offset="100%" style="stop-color:#ba68c8"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="360" height="400" fill="#eceff1" class="svg-bg" rx="12"/>
  
  <!-- Title -->
  <text x="180" y="35" text-anchor="middle" fill="#263238" class="svg-text" font-size="18" font-weight="bold" font-family="Roboto, Arial, sans-serif">Физические интерфейсы</text>
  
  <!-- WiFi -->
  <g transform="translate(80, 80)">
    <rect x="-55" y="-25" width="110" height="50" rx="8" fill="url(#wifiGrad)" stroke="#1976d2" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#0d47a1" class="svg-text" font-size="16" font-weight="bold" font-family="Roboto, Arial, sans-serif">WiFi</text>
    <text x="0" y="22" text-anchor="middle" fill="#1565c0" class="svg-text" font-size="12" font-family="Roboto, Arial, sans-serif">~100 м</text>
  </g>
  
  <!-- LoRa -->
  <g transform="translate(280, 80)">
    <rect x="-55" y="-25" width="110" height="50" rx="8" fill="url(#loraGrad)" stroke="#f57c00" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#e65100" class="svg-text" font-size="16" font-weight="bold" font-family="Roboto, Arial, sans-serif">LoRa</text>
    <text x="0" y="22" text-anchor="middle" fill="#ef6c00" class="svg-text" font-size="12" font-family="Roboto, Arial, sans-serif">2-? км</text>
  </g>
  
  <!-- Ethernet -->
  <g transform="translate(80, 170)">
    <rect x="-55" y="-25" width="110" height="50" rx="8" fill="url(#ethGrad)" stroke="#43a047" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#1b5e20" class="svg-text" font-size="16" font-weight="bold" font-family="Roboto, Arial, sans-serif">Ethernet</text>
    <text x="0" y="22" text-anchor="middle" fill="#2e7d32" class="svg-text" font-size="12" font-family="Roboto, Arial, sans-serif">~100 м</text>
  </g>
  
  <!-- TCP/IP -->
  <g transform="translate(280, 170)">
    <rect x="-55" y="-25" width="110" height="50" rx="8" fill="url(#tcpGrad)" stroke="#00acc1" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#006064" class="svg-text" font-size="16" font-weight="bold" font-family="Roboto, Arial, sans-serif">TCP/IP</text>
    <text x="0" y="22" text-anchor="middle" fill="#00838f" class="svg-text" font-size="12" font-family="Roboto, Arial, sans-serif">∞</text>
  </g>
  
  <!-- Bluetooth -->
  <g transform="translate(80, 260)">
    <rect x="-55" y="-25" width="110" height="50" rx="8" fill="url(#btGrad)" stroke="#3949ab" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#1a237e" class="svg-text" font-size="16" font-weight="bold" font-family="Roboto, Arial, sans-serif">Bluetooth</text>
    <text x="0" y="22" text-anchor="middle" fill="#283593" class="svg-text" font-size="12" font-family="Roboto, Arial, sans-serif">~10 м</text>
  </g>
  
  <!-- Serial -->
  <g transform="translate(280, 260)">
    <rect x="-55" y="-25" width="110" height="50" rx="8" fill="url(#serialGrad)" stroke="#8e24aa" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#4a148c" class="svg-text" font-size="16" font-weight="bold" font-family="Roboto, Arial, sans-serif">Serial</text>
    <text x="0" y="22" text-anchor="middle" fill="#6a1b9a" class="svg-text" font-size="12" font-family="Roboto, Arial, sans-serif">~10 м</text>
  </g>
  
  <!-- Center RNS label -->
  <circle cx="180" cy="340" r="45" fill="#bbdefb" stroke="#1976d2" stroke-width="3"/>
  <text x="180" y="335" text-anchor="middle" fill="#0d47a1" class="svg-text" font-size="18" font-weight="bold" font-family="Roboto, Arial, sans-serif">RNS</text>
  <text x="180" y="355" text-anchor="middle" fill="#1565c0" class="svg-text" font-size="11" font-family="Roboto, Arial, sans-serif">Stack</text>
  
  <!-- Connection lines to center -->
  <line x1="110" y1="105" x2="150" y2="310" stroke="#1976d2" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="250" y1="105" x2="210" y2="310" stroke="#f57c00" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="110" y1="195" x2="145" y2="320" stroke="#43a047" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="250" y1="195" x2="215" y2="320" stroke="#00acc1" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="110" y1="285" x2="155" y2="330" stroke="#3949ab" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="250" y1="285" x2="205" y2="330" stroke="#8e24aa" stroke-width="2" stroke-dasharray="5,3"/>
</svg>
