<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" class="diagram-svg">
  <defs>
    <linearGradient id="propGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ab47bc"/>
      <stop offset="100%" style="stop-color:#7b1fa2"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="700" height="480" fill="#f3e5f5" rx="16" class="svg-bg"/>
  
  <!-- Title -->
  <text x="350" y="35" text-anchor="middle" fill="#6a1b9a" class="svg-text" font-size="16" font-weight="bold">Propagation-сервер</text>
  
  <!-- Central Propagation Server (simplified) -->
  <g transform="translate(350, 120)" filter="url(#shadow)">
    <rect x="-50" y="-45" width="100" height="90" rx="8" fill="url(#propGrad)" stroke="#4a148c" stroke-width="2.5"/>
    <!-- Server indicator -->
    <rect x="-40" y="-35" width="80" height="50" rx="4" fill="#ffffff" opacity="0.2"/>
    <!-- Antenna -->
    <line x1="0" y1="-45" x2="0" y2="-70" stroke="#7b1fa2" stroke-width="4"/>
    <circle cx="0" cy="-72" r="6" fill="#ab47bc"/>
    <!-- Signal waves -->
    <path d="M -8 -78 Q 0 -90 8 -78" stroke="#ab47bc" stroke-width="2.5" fill="none" opacity="0.7"/>
    <!-- Label -->
    <text x="0" y="65" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">Сервер</text>
  </g>
  
  <!-- Connected nodes (simpler, better spacing) -->
  <!-- Node 1 (top left) - Mobile -->
  <g transform="translate(100, 100)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="25" fill="#ffffff" stroke="#ab47bc" stroke-width="2.5"/>
    <text x="0" y="8" text-anchor="middle" fill="#7b1fa2" font-size="20">📱</text>
  </g>
  <text x="100" y="145" text-anchor="middle" fill="#4a148c" class="svg-label" font-size="11" font-weight="600">Клиент A</text>
  
  <!-- Node 2 (top right) - Desktop -->
  <g transform="translate(600, 100)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="25" fill="#ffffff" stroke="#ab47bc" stroke-width="2.5"/>
    <text x="0" y="8" text-anchor="middle" fill="#7b1fa2" font-size="20">💻</text>
  </g>
  <text x="600" y="145" text-anchor="middle" fill="#4a148c" class="svg-label" font-size="11" font-weight="600">Клиент B</text>
  
  <!-- Node 3 (bottom left) - LoRa -->
  <g transform="translate(140, 320)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="25" fill="#ffffff" stroke="#ab47bc" stroke-width="2.5"/>
    <text x="0" y="8" text-anchor="middle" fill="#7b1fa2" font-size="20">📻</text>
  </g>
  <text x="140" y="365" text-anchor="middle" fill="#4a148c" class="svg-label" font-size="11" font-weight="600">LoRa Узел</text>
  
  <!-- Node 4 (bottom right) - Other server -->
  <g transform="translate(560, 320)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="25" fill="#ffffff" stroke="#ab47bc" stroke-width="2.5"/>
    <text x="0" y="8" text-anchor="middle" fill="#7b1fa2" font-size="20">🌐</text>
  </g>
  <text x="560" y="365" text-anchor="middle" fill="#4a148c" class="svg-label" font-size="11" font-weight="600">Др. сервер</text>
  
  <!-- Connection lines (straight, simpler) -->
  <line x1="125" y1="110" x2="290" y2="110" stroke="#ab47bc" stroke-width="2.5" stroke-dasharray="6,4" opacity="0.7"/>
  <line x1="575" y1="110" x2="410" y2="110" stroke="#ab47bc" stroke-width="2.5" stroke-dasharray="6,4" opacity="0.7"/>
  <line x1="165" y1="300" x2="310" y2="180" stroke="#ab47bc" stroke-width="2.5" stroke-dasharray="6,4" opacity="0.7"/>
  <line x1="535" y1="300" x2="390" y2="180" stroke="#ab47bc" stroke-width="2.5" stroke-dasharray="6,4" opacity="0.7"/>
  
  <!-- Functions (bottom, simplified as icons) -->
  <g transform="translate(200, 410)">
    <circle cx="30" cy="15" r="14" fill="#ab47bc" opacity="0.3"/>
    <text x="30" y="20" text-anchor="middle" fill="#6a1b9a" font-size="14">💾</text>
    <text x="30" y="45" text-anchor="middle" fill="#555" font-size="10">Хранение</text>
  </g>
  <g transform="translate(300, 410)">
    <circle cx="30" cy="15" r="14" fill="#ab47bc" opacity="0.3"/>
    <text x="30" y="20" text-anchor="middle" fill="#6a1b9a" font-size="14">🔀</text>
    <text x="30" y="45" text-anchor="middle" fill="#555" font-size="10">Маршрутизация</text>
  </g>
  <g transform="translate(400, 410)">
    <circle cx="30" cy="15" r="14" fill="#ab47bc" opacity="0.3"/>
    <text x="30" y="20" text-anchor="middle" fill="#6a1b9a" font-size="14">🔄</text>
    <text x="30" y="45" text-anchor="middle" fill="#555" font-size="10">Репликация</text>
  </g>
  <g transform="translate(500, 410)">
    <circle cx="30" cy="15" r="14" fill="#ab47bc" opacity="0.3"/>
    <text x="30" y="20" text-anchor="middle" fill="#6a1b9a" font-size="14">🗄️</text>
    <text x="30" y="45" text-anchor="middle" fill="#555" font-size="10">Кэш</text>
  </g>
</svg>
