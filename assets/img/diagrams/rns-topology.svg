<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" class="diagram-svg">
  <defs>
    <style>
      @font-face {
        font-family: 'Roboto Mono';
        src: url('../../fonts/RobotoMono-Regular.woff2') format('woff2');
        font-weight: 400;
      }
      @font-face {
        font-family: 'Roboto Mono';
        src: url('../../fonts/RobotoMono-Medium.woff2') format('woff2');
        font-weight: 500;
      }
      @font-face {
        font-family: 'Roboto Mono';
        src: url('../../fonts/RobotoMono-Bold.woff2') format('woff2');
        font-weight: 700;
      }
      .svg-text { font-family: 'Roboto Mono', monospace; }
    </style>
    <linearGradient id="topoGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11998e"/>
      <stop offset="100%" style="stop-color:#38ef7d"/>
    </linearGradient>
    <linearGradient id="topoGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fc4a1a"/>
      <stop offset="100%" style="stop-color:#f7b733"/>
    </linearGradient>
    <linearGradient id="topoGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <filter id="shadow3" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.2"/>
    </filter>
    <!-- Smaller arrowhead markers (compact size) -->
    <marker id="arrowLoRa" markerWidth="4" markerHeight="3" refX="3" refY="1.5" orient="auto">
      <path d="M 0 0 L 4 1.5 L 0 3 Z" fill="#11998e"/>
    </marker>
    <marker id="arrowWiFi" markerWidth="4" markerHeight="3" refX="3" refY="1.5" orient="auto">
      <path d="M 0 0 L 4 1.5 L 0 3 Z" fill="#fc4a1a"/>
    </marker>
    <marker id="arrowEth" markerWidth="4" markerHeight="3" refX="3" refY="1.5" orient="auto">
      <path d="M 0 0 L 4 1.5 L 0 3 Z" fill="#4facfe"/>
    </marker>
    <!-- Gradient for connection lines -->
    <linearGradient id="lineGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#11998e"/>
      <stop offset="100%" style="stop-color:#38ef7d"/>
    </linearGradient>
    <linearGradient id="lineGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fc4a1a"/>
      <stop offset="100%" style="stop-color:#f7b733"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="750" fill="#e8f5e9" rx="16" class="svg-bg"/>
  
  <!-- Title -->
  <text x="500" y="45" text-anchor="middle" fill="#1b5e20" class="svg-text" font-size="18" font-weight="bold">Сетевая топология RNS</text>
  
  <!-- Node A - LoRa (top-left with increased spacing) -->
  <g transform="translate(100, 100)" filter="url(#shadow3)">
    <circle cx="50" cy="50" r="42" fill="url(#topoGrad1)" stroke="#1b5e20" stroke-width="3"/>
    <text x="50" y="48" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">📡</text>
    <text x="50" y="66" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold" class="svg-text">Узел A</text>
    <text x="50" y="80" text-anchor="middle" fill="#c8e6c9" font-size="10" class="svg-text">LoRa</text>
  </g>
  
  <!-- Node B - WiFi (top-right with increased spacing) -->
  <g transform="translate(800, 100)" filter="url(#shadow3)">
    <circle cx="50" cy="50" r="42" fill="url(#topoGrad2)" stroke="#bf360c" stroke-width="3"/>
    <text x="50" y="48" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">📶</text>
    <text x="50" y="66" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold" class="svg-text">Узел B</text>
    <text x="50" y="80" text-anchor="middle" fill="#ffe0b2" font-size="10" class="svg-text">WiFi</text>
  </g>
  
  <!-- Node C - Ethernet (center with more space) -->
  <g transform="translate(500, 350)" filter="url(#shadow3)">
    <circle cx="50" cy="50" r="42" fill="url(#topoGrad3)" stroke="#01579b" stroke-width="3"/>
    <text x="50" y="48" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">🌐</text>
    <text x="50" y="66" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold" class="svg-text">Узел C</text>
    <text x="50" y="80" text-anchor="middle" fill="#b3e5fc" font-size="10" class="svg-text">Ethernet</text>
  </g>
  
  <!-- Node D - Serial (bottom-left with increased spacing) -->
  <g transform="translate(100, 600)" filter="url(#shadow3)">
    <circle cx="50" cy="50" r="42" fill="#9c27b0" stroke="#4a148c" stroke-width="3"/>
    <text x="50" y="48" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">🔌</text>
    <text x="50" y="66" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold" class="svg-text">Узел D</text>
    <text x="50" y="80" text-anchor="middle" fill="#e1bee7" font-size="10" class="svg-text">Serial</text>
  </g>
  
  <!-- Node E - Laser (bottom-right with increased spacing) -->
  <g transform="translate(800, 600)" filter="url(#shadow3)">
    <circle cx="50" cy="50" r="42" fill="#ff5722" stroke="#bf360c" stroke-width="3"/>
    <text x="50" y="48" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">💡</text>
    <text x="50" y="66" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold" class="svg-text">Узел E</text>
    <text x="50" y="80" text-anchor="middle" fill="#ffccbc" font-size="10" class="svg-text">Лазер</text>
  </g>
  
  <!-- Connection lines with smooth Bezier curves and proper spacing -->
  <!-- A to C - smooth curved connection with better control points -->
  <path d="M 158 150 C 250 200, 320 250, 392 300" stroke="url(#lineGrad1)" stroke-width="2" stroke-dasharray="6,4" fill="none" marker-end="url(#arrowLoRa)"/>
  
  <!-- B to C - smooth curved connection with better control points -->
  <path d="M 742 150 C 650 200, 580 250, 508 300" stroke="url(#lineGrad2)" stroke-width="2" stroke-dasharray="6,4" fill="none" marker-end="url(#arrowWiFi)"/>
  
  <!-- C to D - smooth curved connection with better control points -->
  <path d="M 400 408 C 300 480, 220 530, 158 560" stroke="url(#lineGrad1)" stroke-width="2" stroke-dasharray="6,4" fill="none" marker-end="url(#arrowEth)"/>
  
  <!-- C to E - smooth curved connection with better control points -->
  <path d="M 600 408 C 680 480, 750 530, 792 560" stroke="url(#lineGrad1)" stroke-width="2" stroke-dasharray="6,4" fill="none" marker-end="url(#arrowEth)"/>
  
  <!-- A to B (long range curved - smoother wider arc) -->
  <path d="M 158 125 C 300 60, 600 60, 742 125" stroke="#11998e" stroke-width="1.5" stroke-dasharray="5,4" fill="none" opacity="0.5" marker-end="url(#arrowLoRa)"/>
  
  <!-- RNS Overlay label -->
  <g transform="translate(500, 700)">
    <rect x="-130" y="-18" width="260" height="36" rx="12" fill="#1b5e20" opacity="0.95"/>
    <text x="0" y="6" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold" class="svg-text">Reticulum Overlay Network</text>
  </g>
</svg>
