<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" class="diagram-svg">
  <defs>
    <style>
      @font-face {
        font-family: 'Roboto Mono';
        src: url('../../fonts/RobotoMono-Regular.woff2') format('woff2');
        font-weight: 400;
      }
      @font-face {
        font-family: 'Roboto Mono';
        src: url('../../fonts/RobotoMono-Medium.woff2') format('woff2');
        font-weight: 500;
      }
      @font-face {
        font-family: 'Roboto Mono';
        src: url('../../fonts/RobotoMono-Bold.woff2') format('woff2');
        font-weight: 700;
      }
      .svg-text { font-family: 'Roboto Mono', monospace; }
    </style>
    
    <!-- Gradients -->
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11998e"/>
      <stop offset="100%" style="stop-color:#38ef7d"/>
    </linearGradient>
    
    <linearGradient id="centerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Shadow -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#f0f7f4" rx="12" class="svg-bg"/>
  
  <!-- Connection lines (background layer) -->
  <g stroke="#11998e" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.4">
    <line x1="200" y1="150" x2="400" y2="250"/>
    <line x1="600" y1="150" x2="400" y2="250"/>
    <line x1="150" y1="350" x2="400" y2="250"/>
    <line x1="650" y1="350" x2="400" y2="250"/>
    <line x1="400" y1="100" x2="400" y2="250"/>
  </g>
  
  <!-- Center Hub - Reticulum Core -->
  <g transform="translate(400, 250)" filter="url(#glow)">
    <circle cx="0" cy="0" r="55" fill="url(#centerGrad)" opacity="0.15"/>
    <circle cx="0" cy="0" r="45" fill="url(#centerGrad)" opacity="0.3"/>
    <circle cx="0" cy="0" r="35" fill="url(#centerGrad)" stroke="#0277bd" stroke-width="2"/>
    <text x="0" y="-8" text-anchor="middle" fill="#01579b" font-size="20" font-weight="bold" class="svg-text">🌐</text>
    <text x="0" y="15" text-anchor="middle" fill="#01579b" font-size="11" font-weight="bold" class="svg-text">Reticulum</text>
  </g>
  
  <!-- Node 1 - Top -->
  <g transform="translate(400, 100)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="28" fill="url(#nodeGrad)" stroke="#1b5e20" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold" class="svg-text">📡</text>
  </g>
  <text x="400" y="145" text-anchor="middle" fill="#2e7d32" font-size="10" class="svg-text">Узел 1</text>
  
  <!-- Node 2 - Top Right -->
  <g transform="translate(600, 150)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="28" fill="url(#nodeGrad)" stroke="#1b5e20" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold" class="svg-text">📶</text>
  </g>
  <text x="600" y="195" text-anchor="middle" fill="#2e7d32" font-size="10" class="svg-text">Узел 2</text>
  
  <!-- Node 3 - Bottom Right -->
  <g transform="translate(650, 350)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="28" fill="url(#nodeGrad)" stroke="#1b5e20" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold" class="svg-text">🔌</text>
  </g>
  <text x="650" y="395" text-anchor="middle" fill="#2e7d32" font-size="10" class="svg-text">Узел 3</text>
  
  <!-- Node 4 - Bottom Left -->
  <g transform="translate(150, 350)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="28" fill="url(#nodeGrad)" stroke="#1b5e20" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold" class="svg-text">📱</text>
  </g>
  <text x="150" y="395" text-anchor="middle" fill="#2e7d32" font-size="10" class="svg-text">Узел 4</text>
  
  <!-- Node 5 - Top Left -->
  <g transform="translate(200, 150)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="28" fill="url(#nodeGrad)" stroke="#1b5e20" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold" class="svg-text">💻</text>
  </g>
  <text x="200" y="195" text-anchor="middle" fill="#2e7d32" font-size="10" class="svg-text">Узел 5</text>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#1b5e20" font-size="16" font-weight="bold" class="svg-text">Сетевая архитектура Reticulum</text>
  
  <!-- Bottom label -->
  <g transform="translate(400, 450)">
    <rect x="-100" y="-14" width="200" height="28" rx="8" fill="#1b5e20" opacity="0.9"/>
    <text x="0" y="6" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold" class="svg-text">Overlay Network</text>
  </g>
</svg>
