<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 320" class="diagram-svg">
  <defs>
    <style>
      @font-face {
        font-family: 'Roboto Mono';
        src: url('../../fonts/RobotoMono-Regular.woff2') format('woff2');
        font-weight: 400;
      }
      @font-face {
        font-family: 'Roboto Mono';
        src: url('../../fonts/RobotoMono-Medium.woff2') format('woff2');
        font-weight: 500;
      }
      @font-face {
        font-family: 'Roboto Mono';
        src: url('../../fonts/RobotoMono-Bold.woff2') format('woff2');
        font-weight: 700;
      }
      .svg-text { font-family: 'Roboto Mono', monospace; }
    </style>
    <linearGradient id="nomadGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00bcd4"/>
      <stop offset="100%" style="stop-color:#006064"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="360" height="320" fill="#e0f7fa" rx="16" class="svg-bg"/>
  
  <!-- Title -->
  <text x="180" y="32" text-anchor="middle" fill="#00838f" class="svg-text" font-size="15" font-weight="bold">💻 Nomad Network</text>
  
  <!-- Central laptop icon (simplified) -->
  <g transform="translate(180, 140)" filter="url(#shadow)">
    <rect x="-40" y="-30" width="80" height="52" rx="5" fill="url(#nomadGrad)" stroke="#006064" stroke-width="2"/>
    <rect x="-34" y="-24" width="68" height="40" rx="2" fill="#b2ebf2"/>
    <rect x="-42" y="22" width="84" height="12" rx="3" fill="#00838f"/>
  </g>
  
  <!-- Feature nodes (compact, no overlapping) -->
  <!-- Messages (top left) -->
  <g transform="translate(70, 65)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="20" fill="#ffffff" stroke="#00bcd4" stroke-width="2"/>
    <text x="0" y="6" text-anchor="middle" fill="#00bcd4" font-size="16">💬</text>
  </g>
  <text x="70" y="98" text-anchor="middle" fill="#006064" class="svg-label" font-size="10" font-weight="600">Сообщения</text>
  
  <!-- Forums (top right) -->
  <g transform="translate(290, 65)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="20" fill="#ffffff" stroke="#00bcd4" stroke-width="2"/>
    <text x="0" y="6" text-anchor="middle" fill="#00bcd4" font-size="16">📝</text>
  </g>
  <text x="290" y="98" text-anchor="middle" fill="#006064" class="svg-label" font-size="10" font-weight="600">Форумы</text>
  
  <!-- Network (bottom left) -->
  <g transform="translate(70, 220)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="20" fill="#ffffff" stroke="#00bcd4" stroke-width="2"/>
    <text x="0" y="6" text-anchor="middle" fill="#00bcd4" font-size="16">🌐</text>
  </g>
  <text x="70" y="253" text-anchor="middle" fill="#006064" class="svg-label" font-size="10" font-weight="600">Децентрализация</text>
  
  <!-- Privacy (bottom right) -->
  <g transform="translate(290, 220)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="20" fill="#ffffff" stroke="#00bcd4" stroke-width="2"/>
    <text x="0" y="6" text-anchor="middle" fill="#00bcd4" font-size="16">🔐</text>
  </g>
  <text x="290" y="253" text-anchor="middle" fill="#006064" class="svg-label" font-size="10" font-weight="600">Приватность</text>
  
  <!-- Connection lines (simple straight) -->
  <line x1="88" y1="75" x2="140" y2="115" stroke="#00bcd4" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="272" y1="75" x2="220" y2="115" stroke="#00bcd4" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="88" y1="205" x2="140" y2="165" stroke="#00bcd4" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="272" y1="205" x2="220" y2="165" stroke="#00bcd4" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>
</svg>
