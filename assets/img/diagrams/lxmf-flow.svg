<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" class="diagram-svg">
  <defs>
    <style>
      @font-face {
        font-family: 'Roboto Mono';
        src: url('../../fonts/RobotoMono-Regular.woff2') format('woff2');
        font-weight: 400;
      }
      @font-face {
        font-family: 'Roboto Mono';
        src: url('../../fonts/RobotoMono-Medium.woff2') format('woff2');
        font-weight: 500;
      }
      @font-face {
        font-family: 'Roboto Mono';
        src: url('../../fonts/RobotoMono-Bold.woff2') format('woff2');
        font-weight: 700;
      }
      .svg-text { font-family: 'Roboto Mono', monospace; }
    </style>
    <linearGradient id="lxmfGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e91e63"/>
      <stop offset="100%" style="stop-color:#880e4f"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="280" height="280" fill="#fce4ec" class="svg-bg" rx="12"/>
  
  <!-- Title -->
  <text x="140" y="30" text-anchor="middle" fill="#e91e63" class="svg-text" font-size="14" font-weight="bold">✉️ LXMF Сообщения</text>
  
  <!-- Sender -->
  <g transform="translate(50, 70)">
    <rect x="-30" y="-25" width="60" height="50" rx="8" fill="#4caf50" stroke="#2e7d32" stroke-width="2"/>
    <text x="0" y="-5" text-anchor="middle" fill="#fff" class="svg-text" font-size="18">👤</text>
    <text x="0" y="15" text-anchor="middle" fill="#fff" class="svg-text" font-size="9" font-weight="bold">Дарья</text>
  </g>
  
  <!-- Receiver -->
  <g transform="translate(230, 70)">
    <rect x="-30" y="-25" width="60" height="50" rx="8" fill="#2196f3" stroke="#1565c0" stroke-width="2"/>
    <text x="0" y="-5" text-anchor="middle" fill="#fff" class="svg-text" font-size="18">👤</text>
    <text x="0" y="15" text-anchor="middle" fill="#fff" class="svg-text" font-size="9" font-weight="bold">Алексей</text>
  </g>
  
  <!-- Message envelope -->
  <g transform="translate(140, 140)">
    <rect x="-40" y="-30" width="80" height="60" rx="6" fill="url(#lxmfGrad)" stroke="#880e4f" stroke-width="2"/>
    <path d="M -35,-25 L 0,5 L 35,-25" fill="none" stroke="#fff" stroke-width="2"/>
    <text x="0" y="15" text-anchor="middle" fill="#fff" class="svg-text" font-size="10" font-weight="bold">LXMF</text>
  </g>
  
  <!-- RNS Network -->
  <g transform="translate(140, 220)">
    <circle cx="0" cy="0" r="25" fill="#9c27b0" stroke="#4a148c" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#fff" class="svg-text" font-size="12">🌐</text>
  </g>
  
  <!-- Arrows -->
  <defs>
    <marker id="arrowPink" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#e91e63"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#9c27b0"/>
    </marker>
  </defs>
  
  <line x1="80" y1="70" x2="100" y2="125" stroke="#e91e63" stroke-width="2" marker-end="url(#arrowPink)"/>
  <line x1="140" y1="170" x2="140" y2="195" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <line x1="140" y1="220" x2="140" y2="250" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <line x1="180" y1="125" x2="200" y2="70" stroke="#2196f3" stroke-width="2" marker-end="url(#arrowPink)"/>
  
  <!-- Features -->
  <text x="140" y="270" text-anchor="middle" fill="#880e4f" class="svg-text" font-size="9">🔐 Шифрование • 📦 Доставка • 💾 Хранение</text>
</svg>
